<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝语言记录 - 录入</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #FCF7F0;
            --card: #FFFFFF;
            --text: #5D534A;
            --accent-orange: #F5C4A8;
            --accent-green: #B8D4B8;
            --accent-blue: #A8C8E8;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 90px;
        }
        
        /* 电脑适配 */
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header-card {
            background: var(--card);
            border-radius: 25px;
            padding: 35px 25px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(139, 119, 101, 0.06);
        }
        
        .baby-icon { font-size: 60px; margin-bottom: 10px; }
        .header-card h1 { font-size: 32px; color: #E89870; margin-bottom: 5px; font-weight: 600; }
        .header-card p { font-size: 16px; color: #8A827A; }
        
        .stats-brief {
            background: linear-gradient(135deg, #FFE8DC 0%, #FFF5EE 100%);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            color: #5D534A;
        }
        
        .stats-number { font-size: 56px; font-weight: 600; color: #E89870; }
        .stats-label { font-size: 18px; color: #B8A090; margin-top: 5px; }
        
        .record-card {
            background: var(--card);
            border-radius: 25px;
            padding: 30px 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(139, 119, 101, 0.06);
        }
        
        .section-title { 
            font-size: 24px; 
            color: #5D534A; 
            text-align: center; 
            margin-bottom: 25px; 
            font-weight: 600;
        }
        
        .lang-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        
        .lang-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid transparent;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .lang-btn .emoji { font-size: 24px; margin-bottom: 3px; }
        
        /* 莫迪色系 - 普通话（橙色系） */
        .lang-btn.mandarin { 
            background: linear-gradient(135deg, #FFE8DC 0%, #FFF5EE 100%); 
            color: #5D534A; 
        }
        .lang-btn.mandarin.selected { 
            background: linear-gradient(135deg, #F5C4A8 0%, #FFAB76 100%); 
            transform: scale(1.1); 
            box-shadow: 0 8px 20px rgba(245, 196, 168, 0.4);
            border-color: #E89870;
        }
        
        /* 莫迪色系 - 粤语（绿色系） */
        .lang-btn.cantonese { 
            background: linear-gradient(135deg, #E8F5E8 0%, #F5FFF5 100%); 
            color: #5D534A; 
        }
        .lang-btn.cantonese.selected { 
            background: linear-gradient(135deg, #B8D4B8 0%, #98C4A8 100%); 
            transform: scale(1.1); 
            box-shadow: 0 8px 20px rgba(152, 192, 152, 0.4);
            border-color: #7AAA7A;
        }
        
        /* 莫迪色系 - 英语（蓝色系） */
        .lang-btn.english { 
            background: linear-gradient(135deg, #E8F0FF 0%, #F5F8FF 100%); 
            color: #5D534A; 
        }
        .lang-btn.english.selected { 
            background: linear-gradient(135deg, #A8C8E8 0%, #88B0E0 100%); 
            transform: scale(1.1); 
            box-shadow: 0 8px 20px rgba(136, 176, 224, 0.4);
            border-color: #6A9AD8;
        }
        
        .input-area { margin-bottom: 25px; }
        .input-label { 
            font-size: 18px; 
            color: #8A827A; 
            margin-bottom: 12px; 
            display: block; 
            text-align: center; 
        }
        
        .word-input {
            width: 100%;
            padding: 20px;
            font-size: 28px;
            border: 2px solid #E8E0D8;
            border-radius: 15px;
            background: #FFF8F5;
            text-align: center;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
            color: #5D534A;
        }
        
        .word-input:focus { 
            border-color: #E89870; 
            background: white; 
        }
        
        .word-input::placeholder {
            color: #B8A090;
            font-size: 20px;
        }
        
        .record-btn {
            width: 100%;
            padding: 25px;
            font-size: 28px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #E89870 0%, #D88060 100%);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(232, 152, 112, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .record-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(232, 152, 112, 0.4);
        }
        
        .record-btn:active {
            transform: translateY(0);
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            padding: 10px 0 20px;
            box-shadow: 0 -4px 20px rgba(139, 119, 101, 0.06);
        }
        
        .nav-inner {
            display: flex;
            justify-content: space-around;
            max-width: 600px;
            width: 100%;
        }
        
        .nav-item {
            text-align: center;
            text-decoration: none;
            color: #8A827A;
            font-size: 16px;
            padding: 0 20px;
        }
        
        .nav-item.active { color: #E89870; font-weight: 600; }
        .nav-item .icon { font-size: 28px; display: block; margin-bottom: 4px; }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(93, 83, 74, 0.9);
            color: white;
            padding: 25px 40px;
            border-radius: 15px;
            font-size: 20px;
            display: none;
            z-index: 1000;
        }
        
        .toast.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <div class="baby-icon">👶</div>
            <h1>宝宝语言记录</h1>
            <p>记录每一个成长的瞬间</p>
        </div>
        
        <div class="stats-brief">
            <div class="stats-number" id="totalCount">150</div>
            <div class="stats-label">宝宝会说多少词</div>
        </div>
        
        <div class="record-card">
            <div class="section-title">🎙️ 选择语言</div>
            <div class="lang-buttons">
                <button class="lang-btn mandarin selected" data-lang="mandarin">
                    <span class="emoji">🗣️</span>普通话
                </button>
                <button class="lang-btn cantonese" data-lang="cantonese">
                    <span class="emoji">🗣️</span>粤语
                </button>
                <button class="lang-btn english" data-lang="english">
                    <span class="emoji">🗣️</span>英语
                </button>
            </div>
            <div class="input-area">
                <label class="input-label">宝宝刚才说的话</label>
                <input type="text" class="word-input" id="wordInput" placeholder="例如：妈妈、抱抱">
            </div>
            
            <div class="input-area" id="chineseInputArea" style="display: none;">
                <label class="input-label">中文翻译（可选）</label>
                <input type="text" class="word-input" id="chineseInput" placeholder="例如：欧文" style="font-size: 22px;">
            </div>
            <button class="record-btn" id="recordBtn">✅ 记录下来</button>
        </div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-inner">
            <a href="record.html" class="nav-item active">
                <span class="icon">📝</span>
                录入
            </a>
            <a href="stats.html" class="nav-item">
                <span class="icon">📊</span>
                统计
            </a>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // 验证邀请码
        if (localStorage.getItem('inviteCodeVerified') !== 'true') {
            window.location.href = '/';
        }
        
        let currentLang = 'mandarin';
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                currentLang = this.dataset.lang;
                
                // 选择英语时显示中文翻译输入框
                const chineseArea = document.getElementById('chineseInputArea');
                if (currentLang === 'english') {
                    chineseArea.style.display = 'block';
                } else {
                    chineseArea.style.display = 'none';
                }
            });
        });
        
        document.getElementById('recordBtn').addEventListener('click', async function() {
            const input = document.getElementById('wordInput');
            const chineseInput = document.getElementById('chineseInput');
            const word = input.value.trim();
            if (!word) { showToast('❌ 请输入宝宝说的话'); return; }
            
            const chinese = chineseInput.value.trim();
            
            try {
                const response = await fetch('/api/words', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        word: word, 
                        language: currentLang === 'mandarin' ? '普通话' : (currentLang === 'cantonese' ? '广东话' : '英语'),
                        chinese: chinese
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    input.value = '';
                    chineseInput.value = '';
                    document.getElementById('totalCount').textContent = result.total;
                    showToast('✅ 记录成功！✨');
                } else {
                    showToast('❌ ' + (result.error || '记录失败'));
                }
            } catch (err) {
                showToast('❌ 网络错误，请重试');
            }
        });
        
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // 初始化统计
        fetch('/api/words')
            .then(res => res.json())
            .then(data => {
                document.getElementById('totalCount').textContent = data.totalWords || 150;
            })
            .catch(() => {
                document.getElementById('totalCount').textContent = 150;
            });
        
        document.getElementById('wordInput').focus();
    </script>
</body>
</html>
