<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝语言记录 - 统计</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #FCF7F0;
            --card: #FFFFFF;
            --text: #5D534A;
            --text-light: #8A827A;
            --accent-orange: #F5C4A8;
            --accent-green: #B8D4B8;
            --accent-blue: #A8C8E8;
            --shadow: rgba(139, 119, 101, 0.06);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding-bottom: 90px;
        }
        
        /* 电脑适配 */
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
        }
        
        .hero {
            background: linear-gradient(135deg, #FFE8DC 0%, #FFF4EE 100%);
            padding: 40px 24px;
            text-align: center;
        }
        
        .hero-num {
            font-size: 72px;
            font-weight: 300;
            color: #E89870;
            line-height: 1;
        }
        
        .hero-num span {
            font-size: 24px;
            font-weight: 400;
            color: #B8A090;
        }
        
        .hero-label {
            font-size: 14px;
            color: #B8A090;
            margin-top: 8px;
            letter-spacing: 3px;
        }
        
        .content { padding: 20px; }
        
        /* 语言大类卡片 */
        .lang-section {
            background: var(--card);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px var(--shadow);
        }
        
        .lang-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #F5F0EB;
        }
        
        .lang-title {
            font-size: 24px;
            font-weight: 600;
            color: #5D534A;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .lang-num {
            font-size: 36px;
            font-weight: 700;
        }
        
        .lang-num.pu { color: #E89870; }
        .lang-num.yue { color: #78A878; }
        .lang-num.en { color: #6898C8; }
        
        /* 小类标题 */
        .cat-title {
            font-size: 16px;
            font-weight: 600;
            color: #8A827A;
            margin: 16px 0 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .cat-num {
            font-size: 20px;
            font-weight: 700;
            color: #E89870;
        }
        
        /* 空分类提示 */
        .cat-empty {
            font-size: 14px;
            color: #B8A090;
            padding: 10px 0;
            font-style: italic;
        }
        
        /* 词汇网格 - 智能自适应 */
        .word-grid {
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
        }
        
        @media (max-width: 768px) {
            .word-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }
        
        .word-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 500;
            color: #5D534A;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .word-item:hover {
            opacity: 0.7;
            transform: scale(0.95);
        }
        
        .word-item.pu {
            background: linear-gradient(135deg, #FFF5EE 0%, #FFE8DC 100%);
        }
        
        .word-item.yue {
            background: linear-gradient(135deg, #E8F5E8 0%, #D8ECD8 100%);
        }
        
        .word-item.en {
            background: linear-gradient(135deg, #E8F0FF 0%, #D8E5FF 100%);
        }
        
        /* 双字、三字、多字词汇网格 */
        .word-grid-wide {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        }
        
        @media (max-width: 768px) {
            .word-grid-wide {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .word-grid-wide {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        .word-item-wide {
            padding: 14px 12px;
            text-align: center;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            color: #5D534A;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .word-item-wide:hover {
            opacity: 0.7;
            transform: scale(0.95);
        }
        
        .word-item-wide.pu {
            background: linear-gradient(135deg, #FFF5EE 0%, #FFE8DC 100%);
        }
        
        .word-item-wide.yue {
            background: linear-gradient(135deg, #E8F5E8 0%, #D8ECD8 100%);
        }
        
        .word-item-wide.en {
            background: linear-gradient(135deg, #E8F0FF 0%, #D8E5FF 100%);
        }
        
        /* 英语词汇带中文 */
        .english-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(135deg, #E8F0FF 0%, #D8E5FF 100%);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .english-item:hover {
            opacity: 0.7;
            transform: scale(0.98);
        }
        
        .english-word {
            font-size: 20px;
            font-weight: 600;
            color: #5D534A;
        }
        
        .english-cn {
            font-size: 16px;
            color: #8A827A;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            padding: 10px 0 20px;
            box-shadow: 0 -4px 20px var(--shadow);
        }
        
        .nav-inner {
            display: flex;
            justify-content: space-around;
            max-width: 600px;
            width: 100%;
        }
        
        .nav-item {
            text-align: center;
            text-decoration: none;
            color: #8A827A;
            font-size: 16px;
            padding: 0 20px;
        }
        
        .nav-item.active { color: #E89870; font-weight: 600; }
        .nav-item .icon { font-size: 28px; display: block; margin-bottom: 4px; }
        
        /* 删除确认弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 320px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #5D534A;
            margin-bottom: 15px;
        }
        
        .modal-word {
            font-size: 32px;
            font-weight: 700;
            color: #E89870;
            margin-bottom: 10px;
        }
        
        .modal-hint {
            font-size: 14px;
            color: #999;
            margin-bottom: 25px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .modal-btn.cancel {
            background: #F5F0EB;
            color: #8A827A;
        }
        
        .modal-btn.cancel:hover {
            background: #E8E0D8;
        }
        
        .modal-btn.delete {
            background: linear-gradient(135deg, #FF6B6B 0%, #EE5A5A 100%);
            color: white;
        }
        
        .modal-btn.delete:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="hero-num" id="totalWords">150<span>词</span></div>
            <div class="hero-label">VOCABULARY</div>
        </div>
        
        <div class="content" id="content">
            <!-- 动态加载 -->
        </div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-inner">
            <a href="record.html" class="nav-item">
                <span class="icon">📝</span>
                录入
            </a>
            <a href="stats.html" class="nav-item active">
                <span class="icon">📊</span>
                统计
            </a>
        </div>
    </div>
    
    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <div class="modal-title">确认删除此词汇？</div>
            <div class="modal-word" id="deleteWord"></div>
            <div class="modal-hint">删除后无法恢复</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn delete" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>

    <script>
        // 验证邀请码
        if (localStorage.getItem('inviteCodeVerified') !== 'true') {
            window.location.href = '/';
        }
        
        // 当前要删除的词汇
        let currentDeleteWord = '';
        
        // 显示删除确认框
        function showDeleteModal(word) {
            currentDeleteWord = word;
            document.getElementById('deleteWord').textContent = word;
            document.getElementById('deleteModal').classList.add('show');
        }
        
        // 关闭确认框
        function closeModal() {
            currentDeleteWord = '';
            document.getElementById('deleteModal').classList.remove('show');
        }
        
        // 确认删除
        document.getElementById('confirmDeleteBtn').addEventListener('click', async function() {
            if (!currentDeleteWord) return;
            
            try {
                const response = await fetch(`/api/words/${encodeURIComponent(currentDeleteWord)}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    closeModal();
                    // 刷新页面
                    location.reload();
                } else {
                    alert('删除失败：' + (result.error || '未知错误'));
                }
            } catch (err) {
                alert('网络错误，请重试');
                console.error(err);
            }
        });
        
        // 点击遮罩关闭
        document.getElementById('deleteModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // 英语词汇中文映射
        const englishMap = {
            'peepee': '尿尿',
            'poopoo': '便便',
            'phone': '电话',
            'spoon': '勺子',
            'moon': '月亮',
            'Apple': '苹果',
            'ball': '球',
            'owen': ''
        };
        
        // 加载数据
        fetch('/api/words')
            .then(res => res.json())
            .then(data => {
                document.getElementById('totalWords').innerHTML = data.totalWords + '<span>词</span>';
                
                let html = '';
                
                // 普通话
                if (data.byLanguage && data.byLanguage['普通话']) {
                    html += createLanguageSection(data.byLanguage['普通话'], '普通话', 'pu');
                }
                
                // 广东话
                if (data.byLanguage && data.byLanguage['广东话']) {
                    html += createLanguageSection(data.byLanguage['广东话'], '广东话', 'yue');
                }
                
                // 英语
                if (data.byLanguage && data.byLanguage['英语']) {
                    html += createEnglishSection(data.byLanguage['英语'], data.wordRegistry);
                }
                
                document.getElementById('content').innerHTML = html;
            })
            .catch(err => {
                console.error('加载数据失败', err);
                document.getElementById('content').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">加载失败，请刷新重试</p>';
            });
        
        // 创建语言分类区块（普通话、粤语）
        function createLanguageSection(langData, langName, langClass) {
            const total = (langData['单字']?.count || 0) + 
                         (langData['双字']?.count || 0) + 
                         (langData['三字']?.count || 0) + 
                         (langData['多字']?.count || 0) +
                         (langData['句子']?.count || 0);
            
            let html = `
                <div class="lang-section">
                    <div class="lang-header">
                        <div class="lang-title">${langName === '普通话' ? '🗣️' : '🎯'} ${langName}</div>
                        <div class="lang-num ${langClass}">${total}</div>
                    </div>
            `;
            
            // 单字（始终显示）
            if (langData['单字']) {
                const words = langData['单字'].words || [];
                const bracketWords = words.filter(w => w.includes('（') || w.includes('('));
                const normalWords = words.filter(w => !w.includes('（') && !w.includes('('));
                
                if (normalWords.length > 0) {
                    html += `
                        <div class="cat-title">单字词汇 <span class="cat-num">${normalWords.length}</span></div>
                        <div class="word-grid">
                    `;
                    normalWords.forEach(w => {
                        html += `<div class="word-item ${langClass}" onclick="showDeleteModal('${w}')">${w}</div>`;
                    });
                    html += `</div>`;
                }
                
                if (bracketWords.length > 0) {
                    html += `
                        <div class="cat-title">带括号的词 <span class="cat-num">${bracketWords.length}</span></div>
                        <div class="word-grid-wide">
                    `;
                    bracketWords.forEach(w => {
                        html += `<div class="word-item-wide ${langClass}" onclick="showDeleteModal('${w}')">${w}</div>`;
                    });
                    html += `</div>`;
                }
            }
            
            // 双字（始终显示）
            const doubleCount = langData['双字']?.count || 0;
            html += `<div class="cat-title">双字词语 <span class="cat-num">${doubleCount}</span></div>`;
            if (doubleCount > 0 && langData['双字'].words) {
                html += `<div class="word-grid-wide">`;
                langData['双字'].words.forEach(w => {
                    html += `<div class="word-item-wide ${langClass}" onclick="showDeleteModal('${w}')">${w}</div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="cat-empty">暂无</div>`;
            }
            
            // 三字（始终显示）
            const tripleCount = langData['三字']?.count || 0;
            html += `<div class="cat-title">三字词语 <span class="cat-num">${tripleCount}</span></div>`;
            if (tripleCount > 0 && langData['三字'].words) {
                html += `<div class="word-grid-wide">`;
                langData['三字'].words.forEach(w => {
                    html += `<div class="word-item-wide ${langClass}" onclick="showDeleteModal('${w}')">${w}</div>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="cat-empty">暂无</div>`;
            }
            
            // 多字（有数据才显示）
            const multiCount = langData['多字']?.count || 0;
            if (multiCount > 0 && langData['多字']?.words) {
                html += `
                    <div class="cat-title">多字词语 <span class="cat-num">${multiCount}</span></div>
                    <div class="word-grid-wide">
                `;
                langData['多字'].words.forEach(w => {
                    html += `<div class="word-item-wide ${langClass}" onclick="showDeleteModal('${w}')">${w}</div>`;
                });
                html += `</div>`;
            }
            
            html += `</div>`;
            return html;
        }
        
        // 创建英语区块
        function createEnglishSection(langData, wordRegistry) {
            const total = (langData['单字']?.count || 0) + 
                         (langData['双字']?.count || 0) + 
                         (langData['三字']?.count || 0) + 
                         (langData['多字']?.count || 0) +
                         (langData['句子']?.count || 0);
            
            let html = `
                <div class="lang-section">
                    <div class="lang-header">
                        <div class="lang-title">🇬🇧 英语</div>
                        <div class="lang-num en">${total}</div>
                    </div>
            `;
            
            // 英语词汇（目前都在"句子"分类里）
            if (langData['句子'] && langData['句子'].words) {
                langData['句子'].words.forEach(w => {
                    // 从wordRegistry获取中文翻译
                    const cn = (wordRegistry && wordRegistry[w] && wordRegistry[w].chinese) || '';
                    html += `
                        <div class="english-item" onclick="showDeleteModal('${w}')">
                            <span class="english-word">${w}</span>
                            <span class="english-cn">${cn}</span>
                        </div>
                    `;
                });
            }
            
            html += `</div>`;
            return html;
        }
    </script>
</body>
</html>
