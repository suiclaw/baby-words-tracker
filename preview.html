<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计风格预览 - 宝宝语言记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
            font-size: 28px;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .style-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        
        .style-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        .style-desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
        }
        
        /* 手机模拟器 */
        .phone {
            width: 280px;
            height: 560px;
            border-radius: 30px;
            overflow: hidden;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            position: relative;
        }
        
        /* 风格1: 极简轻奢 */
        .style-1 {
            background: linear-gradient(135deg, #FAFAFA 0%, #F0F0F0 100%);
        }
        .style-1 .card {
            background: rgba(255,255,255,0.98);
            border: 1px solid rgba(201,169,98,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .style-1 .accent { background: #C9A962; }
        .style-1 .text { color: #2C2C2C; }
        .style-1 .btn { background: #C9A962; }
        
        /* 风格2: 莫兰迪 */
        .style-2 {
            background: linear-gradient(135deg, #E8E4E1 0%, #D4CFC9 100%);
        }
        .style-2 .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(139,119,101,0.15);
        }
        .style-2 .accent { background: #B8A99A; }
        .style-2 .text { color: #5A534A; }
        .style-2 .btn { background: #B8A99A; }
        
        /* 风格3: 新中式 */
        .style-3 {
            background: linear-gradient(135deg, #F5F0E8 0%, #E8E0D4 100%);
        }
        .style-3 .card {
            background: rgba(255,252,248,0.95);
            border: 1px solid rgba(184,84,80,0.15);
            box-shadow: 0 8px 30px rgba(139,119,101,0.12);
        }
        .style-3 .accent { background: #B85450; }
        .style-3 .text { color: #3A3530; }
        .style-3 .btn { background: #B85450; }
        .style-3 .pattern {
            position: absolute;
            top: 0; left: 0; right: 0; height: 100px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M0,50 Q25,30 50,50 T100,50" fill="none" stroke="rgba(184,84,80,0.1)" stroke-width="2"/></svg>');
            opacity: 0.5;
        }
        
        /* 风格4: 玻璃拟态 */
        .style-4 {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .style-4 .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(233,69,96,0.2);
        }
        .style-4 .accent { 
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            box-shadow: 0 0 30px rgba(233,69,96,0.4);
        }
        .style-4 .text { color: #eaeaea; }
        .style-4 .btn { 
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            box-shadow: 0 4px 20px rgba(233,69,96,0.4);
        }
        
        /* 通用手机内容 */
        .phone-content {
            padding: 50px 20px 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        
        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .subtitle {
            text-align: center;
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 25px;
        }
        
        .stats-box {
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            margin-bottom: 25px;
        }
        
        .stats-box .num {
            font-size: 42px;
            font-weight: 700;
            color: white;
        }
        
        .stats-box .label {
            font-size: 12px;
            color: white;
            opacity: 0.9;
        }
        
        .btn-main {
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            color: white;
            font-size: 15px;
            font-weight: 500;
        }
        
        .select-btn {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: 2px solid #333;
            background: white;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .select-btn:hover {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <h1>🎨 选择您喜欢的设计风格</h1>
    
    <div class="gallery">
        <!-- 风格1: 极简轻奢 -->
        <div class="style-card">
            <div class="style-name">1. 极简轻奢</div>
            <div class="style-desc">纯白背景 · 金色点缀 · 纤细字体 · 高级感</div>
            <div class="phone style-1">
                <div class="phone-content">
                    <div class="card" style="flex:1; display:flex; flex-direction:column; justify-content:center; padding:25px;">
                        <div class="avatar accent">👶</div>
                        <div class="title text">宝宝语言</div>
                        <div class="subtitle text">记录每一个成长的瞬间</div>
                        <div class="stats-box accent">
                            <div class="num">135</div>
                            <div class="label">已记录词汇</div>
                        </div>
                        <div class="btn-main btn">开始记录</div>
                    </div>
                </div>
            </div>
            <button class="select-btn">选择此风格</button>
        </div>
        
        <!-- 风格2: 莫兰迪 -->
        <div class="style-card">
            <div class="style-name">2. 莫兰迪色系</div>
            <div class="style-desc">低饱和配色 · 柔和渐变 · 毛玻璃 · 温润感</div>
            <div class="phone style-2">
                <div class="phone-content">
                    <div class="card" style="flex:1; display:flex; flex-direction:column; justify-content:center; padding:25px;">
                        <div class="avatar accent">👶</div>
                        <div class="title text">宝宝语言</div>
                        <div class="subtitle text">记录每一个成长的瞬间</div>
                        <div class="stats-box accent">
                            <div class="num">135</div>
                            <div class="label">已记录词汇</div>
                        </div>
                        <div class="btn-main btn">开始记录</div>
                    </div>
                </div>
            </div>
            <button class="select-btn">选择此风格</button>
        </div>
        
        <!-- 风格3: 新中式 -->
        <div class="style-card">
            <div class="style-name">3. 新中式</div>
            <div class="style-desc">水墨意境 · 传统色彩 · 朱砂红 · 东方美</div>
            <div class="phone style-3">
                <div class="pattern"></div>
                <div class="phone-content">
                    <div class="card" style="flex:1; display:flex; flex-direction:column; justify-content:center; padding:25px; position:relative; z-index:1;">
                        <div class="avatar accent">👶</div>
                        <div class="title text">宝宝语言</div>
                        <div class="subtitle text">记录每一个成长的瞬间</div>
                        <div class="stats-box accent">
                            <div class="num">135</div>
                            <div class="label">已记录词汇</div>
                        </div>
                        <div class="btn-main btn">开始记录</div>
                    </div>
                </div>
            </div>
            <button class="select-btn">选择此风格</button>
        </div>
        
        <!-- 风格4: 玻璃拟态 -->
        <div class="style-card">
            <div class="style-name">4. 玻璃拟态</div>
            <div class="style-desc">深色背景 · 霓虹光晕 · 半透明 · 科技感</div>
            <div class="phone style-4">
                <div class="phone-content">
                    <div class="card" style="flex:1; display:flex; flex-direction:column; justify-content:center; padding:25px;">
                        <div class="avatar">👶</div>
                        <div class="title text">宝宝语言</div>
                        <div class="subtitle text">记录每一个成长的瞬间</div>
                        <div class="stats-box accent">
                            <div class="num">135</div>
                            <div class="label">已记录词汇</div>
                        </div>
                        <div class="btn-main btn">开始记录</div>
                    </div>
                </div>
            </div>
            <button class="select-btn">选择此风格</button>
        </div>
    </div>
</body>
</html>
