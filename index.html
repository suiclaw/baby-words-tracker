<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宝宝语言记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #E8E4E1;
            --card: rgba(255, 255, 255, 0.92);
            --text: #5A534A;
            --text-light: #8A827A;
            --accent-1: #B8A99A;
            --accent-2: #A8B5BA;
            --accent-3: #B5C4B1;
            --shadow: rgba(139, 119, 101, 0.12);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        
        .container { max-width: 100%; margin: 0 auto; }
        
        /* 顶部欢迎区 */
        .hero {
            background: linear-gradient(160deg, #D4CFC9 0%, #C9C4BE 100%);
            padding: 60px 28px 50px;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(184,169,154,0.2) 0%, transparent 70%);
            border-radius: 50%;
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 16px 40px rgba(139,119,101,0.25);
        }
        
        .hero h1 {
            font-size: 32px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: 4px;
        }
        
        .hero .subtitle {
            font-size: 15px;
            color: var(--text-light);
            margin-bottom: 32px;
        }
        
        /* 统计卡片 */
        .stats-card {
            background: var(--card);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 12px 40px var(--shadow);
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .stats-number {
            font-size: 56px;
            font-weight: 300;
            color: var(--text);
            line-height: 1;
        }
        
        .stats-info {
            flex: 1;
        }
        
        .stats-label {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        
        .stats-desc {
            font-size: 13px;
            color: var(--accent-1);
        }
        
        /* 快捷操作区 */
        .actions {
            padding: 28px;
        }
        
        .section-title {
            font-size: 13px;
            color: var(--text-light);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .btn-large {
            background: var(--card);
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 8px 28px var(--shadow);
            transition: all 0.3s;
        }
        
        .btn-large:active {
            transform: scale(0.98);
        }
        
        .btn-large .icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 28px;
        }
        
        .btn-large.primary .icon {
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
        }
        
        .btn-large.secondary .icon {
            background: linear-gradient(135deg, var(--accent-2) 0%, var(--accent-3) 100%);
        }
        
        .btn-large .label {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }
        
        .btn-large .hint {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 16px 0 24px;
            box-shadow: 0 -8px 32px var(--shadow);
        }
        
        .nav-item {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: var(--text-light);
            font-size: 11px;
            transition: all 0.3s;
        }
        
        .nav-item.active {
            color: var(--accent-1);
        }
        
        .nav-item .icon {
            font-size: 22px;
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="hero-content">
                <div class="avatar">👶</div>
                <h1>宝宝语言</h1>
                <p class="subtitle">记录每一个成长的瞬间</p>
                
                <div class="stats-card">
                    <div class="stats-number">135</div>
                    <div class="stats-info">
                        <div class="stats-label">已记录词汇</div>
                        <div class="stats-desc">继续加油！</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <div class="section-title">Quick Actions</div>
            <div class="btn-grid">
                <a href="record.html" class="btn-large primary">
                    <div class="icon">✏️</div>
                    <div class="label">记录新词</div>
                    <div class="hint">宝宝今天说了什么</div>
                </a>
                <a href="stats-v2.html" class="btn-large secondary">
                    <div class="icon">📊</div>
                    <div class="label">查看统计</div>
                    <div class="hint">完整词汇列表</div>
                </a>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <span class="icon">🏠</span>
            首页
        </a>
        <a href="record.html" class="nav-item">
            <span class="icon">📝</span>
            录入
        </a>
        <a href="stats-v2.html" class="nav-item">
            <span class="icon">📊</span>
            统计
        </a>
    </div>
</body>
</html>
