<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宝宝语言记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 30px;
            padding: 50px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .baby-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 16px;
            color: #999;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .input-wrapper {
            margin-bottom: 30px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            text-align: center;
            border: 3px solid #eee;
            border-radius: 20px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            border-color: #667eea;
        }
        
        input[type="text"]::placeholder {
            color: #ccc;
            font-size: 18px;
        }
        
        .error-msg {
            color: #ff4757;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        button {
            width: 100%;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .hint {
            margin-top: 30px;
            font-size: 14px;
            color: #999;
            line-height: 1.6;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .shake {
            animation: shake 0.3s;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="baby-icon">👶</div>
        <h1>宝宝语言记录</h1>
        <p class="subtitle">首次访问请输入邀请码<br>之后无需再输入</p>
        
        <div class="input-wrapper">
            <input type="text" id="inviteCode" placeholder="请输入邀请码" maxlength="20" autocomplete="off">
            <p class="error-msg" id="errorMsg">邀请码错误，请重试</p>
        </div>
        
        <button onclick="checkInviteCode()">进入</button>
        
        <p class="hint">💡 提示：忘记邀请码请联系小白<br>邀请码只需输入一次</p>
    </div>
    
    <script>
        // 正确邀请码（可以随时改）
        const CORRECT_CODE = 'baobao2026';
        
        // 检查是否已有邀请码
        if (localStorage.getItem('inviteCodeVerified') === 'true') {
            window.location.href = '/record.html';
        }
        
        // 检查邀请码
        function checkInviteCode() {
            const input = document.getElementById('inviteCode');
            const errorMsg = document.getElementById('errorMsg');
            const code = input.value.trim();
            
            if (code === CORRECT_CODE) {
                // 邀请码正确，保存到localStorage
                localStorage.setItem('inviteCodeVerified', 'true');
                localStorage.setItem('inviteCode', code);
                window.location.href = '/record.html';
            } else {
                // 邀请码错误
                errorMsg.classList.add('show');
                input.classList.add('shake');
                input.value = '';
                
                setTimeout(() => {
                    input.classList.remove('shake');
                }, 300);
            }
        }
        
        // 回车提交
        document.getElementById('inviteCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkInviteCode();
            }
        });
        
        // 输入时隐藏错误提示
        document.getElementById('inviteCode').addEventListener('input', function() {
            document.getElementById('errorMsg').classList.remove('show');
        });
    </script>
</body>
</html>
