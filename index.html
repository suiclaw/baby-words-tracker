<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝宝语言记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
            background: #F5EDE4;
            min-height: 100vh;
            padding-bottom: 90px;
        }
        .hero {
            background: linear-gradient(135deg, #E8C4B8 0%, #F5E6D8 100%);
            padding: 60px 28px 50px;
            text-align: center;
        }
        .avatar {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #D4A88C 0%, #E8C4B8 100%);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px;
            box-shadow: 0 12px 32px rgba(212, 168, 140, 0.3);
        }
        h1 { font-size: 32px; font-weight: 600; color: #5D534A; margin-bottom: 8px; }
        .subtitle { font-size: 15px; color: #8A827A; margin-bottom: 32px; }
        .stats-box {
            background: white;
            border-radius: 20px;
            padding: 24px;
            display: flex; align-items: center; gap: 20px;
            box-shadow: 0 8px 24px rgba(139, 119, 101, 0.08);
        }
        .stats-num { font-size: 52px; font-weight: 300; color: #D4A88C; }
        .stats-label { font-size: 14px; color: #8A827A; }
        .actions { padding: 28px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-card {
            background: white;
            border-radius: 18px;
            padding: 28px 20px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(139, 119, 101, 0.08);
        }
        .btn-icon {
            width: 56px; height: 56px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; font-size: 28px;
        }
        .btn-card.primary .btn-icon { background: linear-gradient(135deg, #D4A88C 0%, #E8C4B8 100%); }
        .btn-card.secondary .btn-icon { background: linear-gradient(135deg, #C4D6C4 0%, #D4E4D4 100%); }
        .btn-card .label { font-size: 16px; font-weight: 600; color: #5D534A; }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            padding: 14px 0 20px;
            box-shadow: 0 -4px 20px rgba(139, 119, 101, 0.08);
        }
        .nav-item { flex: 1; text-align: center; text-decoration: none; color: #8A827A; font-size: 11px; }
        .nav-item.active { color: #D4A88C; }
        .nav-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="avatar">👶</div>
        <h1>宝宝语言</h1>
        <p class="subtitle">记录每一个成长的瞬间</p>
        <div class="stats-box">
            <div class="stats-num">140</div>
            <div class="stats-label">已记录词汇</div>
        </div>
    </div>
    <div class="actions">
        <div class="btn-grid">
            <a href="record.html" class="btn-card primary">
                <div class="btn-icon">✏️</div>
                <div class="label">记录新词</div>
            </a>
            <a href="stats-v2.html" class="btn-card secondary">
                <div class="btn-icon">📊</div>
                <div class="label">查看统计</div>
            </a>
        </div>
    </div>
    <div class="bottom-nav">
        <a href="index.html" class="nav-item active"><span class="icon">🏠</span>首页</a>
        <a href="record.html" class="nav-item"><span class="icon">📝</span>录入</a>
        <a href="stats-v2.html" class="nav-item"><span class="icon">📊</span>统计</a>
    </div>
</body>
</html>
